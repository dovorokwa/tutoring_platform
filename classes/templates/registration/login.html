<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MyTutor CAPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6" style="font-family: 'Inter', sans-serif;">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="text-2xl font-black text-blue-900 tracking-tighter mb-2">MyTutor<span class="text-blue-600">CAPS</span></div>
            <h2 class="text-xl font-bold text-gray-800">Welcome Back</h2>
        </div>

        {% if form.errors %}
        <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-xl text-sm animate-pulse">
            <p class="font-bold">Access Denied</p>
            <p>Incorrect username or password. If you haven't joined yet, please enroll below.</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-800 transition shadow-lg shadow-blue-900/20 transform active:scale-95">
                Log In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline block mt-2 text-base">Enroll in 2026 Classes Now</a>
            </p>
        </div>
    </div>
</body>
</html>
