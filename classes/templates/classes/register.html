<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | MyTutor CAPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Style the Django checkboxes */
        input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.5rem;
            border: 2px solid #cbd5e1;
            margin-right: 0.75rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-blue-50/50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/10 p-8 md:p-12 border border-white">
        <div class="text-center mb-10">
            <div class="text-2xl font-black text-blue-900 tracking-tighter mb-2">MyTutor<span class="text-blue-600">CAPS</span></div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Create Your Account</h2>
            <p class="text-gray-500 mt-2 text-sm">Fill in your details to start your 2026 journey</p>
        </div>

        <form method="post" class="space-y-6" autocomplete="off">
            {% csrf_token %}

            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Username</label>
                        {{ form.username }}
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Email Address</label>
                        {{ form.email }}
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Password</label>
                    {{ form.password }}
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-blue-900 mb-2 ml-1 uppercase tracking-wider">Which Grade are you in?</label>
                    {{ form.grade }}
                </div>

                <div>
                    <label class="block text-sm font-bold text-blue-900 mb-4 ml-1 uppercase tracking-wider">Select Subjects</label>
                    <div class="bg-slate-50 rounded-2xl p-2 border border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-2">
                        {% for checkbox in form.subjects %}
                            <label class="flex items-center p-4 bg-white rounded-xl border border-gray-200 hover:border-blue-400 hover:shadow-sm transition cursor-pointer group">
                                {{ checkbox.tag }}
                                <span class="text-gray-700 font-bold group-hover:text-blue-900 transition">{{ checkbox.choice_label }}</span>
                            </label>
                        {% endfor %}
                    </div>
                    <div class="flex items-center gap-2 mt-4 px-2">
                        <span class="flex h-2 w-2 rounded-full bg-blue-500"></span>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            Pricing: R500 for one | R800 for two
                        </p>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-800 transition shadow-xl shadow-blue-900/20 transform active:scale-[0.98]">
                Complete Enrollment
            </button>
        </form>

        <p class="text-center mt-8 text-gray-500 text-sm">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Log in here</a>
        </p>
    </div>

</body>
</html>
