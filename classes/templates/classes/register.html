<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | MyTutor CAPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Style the hidden Django checkboxes */
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 0.25rem;
            border: 2px solid #cbd5e1;
            margin-right: 0.75rem;
        }
    </style>
</head>
<body class="bg-blue-50/50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/10 p-8 md:p-12 border border-white">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-blue-900 tracking-tight">Create Your Account</h2>
            <p class="text-gray-500 mt-2">Join the 2026 CAPS Excellence Program</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Username</label>
                    {{ form.username }}
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Email Address</label>
                    {{ form.email }}
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1">Password</label>
                    {{ form.password }}
                </div>
            </div>

            <div class="pt-4">
                <label class="block text-sm font-bold text-blue-900 mb-4 ml-1 uppercase tracking-wider">Select Your Subjects</label>
                <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 space-y-3">
                    {% for checkbox in form.subjects %}
                        <label class="flex items-center p-3 rounded-xl hover:bg-white hover:shadow-sm transition cursor-pointer border border-transparent hover:border-blue-100">
                            {{ checkbox.tag }}
                            <span class="text-gray-700 font-semibold">{{ checkbox.choice_label }}</span>
                        </label>
                    {% endfor %}
                </div>
                <p class="text-xs text-gray-400 mt-3 ml-1 italic">
                    Note: 1 subject = R380/pm | 2 subjects = R700/pm
                </p>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-xl shadow-blue-600/20 transform hover:-translate-y-0.5">
                Complete Enrollment
            </button>
        </form>

        <p class="text-center mt-8 text-gray-500">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Log in</a>
        </p>
    </div>

</body>
</html>
